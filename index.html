<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain of Industry — Resource Calculator</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Resource Calculator</h1>
    <p class="subtitle">Captain of Industry</p>
  </header>

  <main class="app-main">
    <!-- Inputs -->
    <section class="panel panel-inputs">
      <h2>Configuration</h2>

      <div class="field">
        <label for="resource-select">Target Resource</label>
        <select id="resource-select"></select>
      </div>

      <div class="field">
        <label for="target-rate">Target Rate (per min)</label>
        <input id="target-rate" type="number" min="0.01" step="any" />
      </div>

      <h3>Your Production</h3>
      <div id="production-fields"></div>
    </section>

    <!-- Results -->
    <section class="panel panel-results">
      <h2>Base Resources Required</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Resource</th>
            <th>Amount</th>
            <th>Unit</th>
          </tr>
        </thead>
        <tbody id="totals-body"></tbody>
      </table>

      <h2>Dependency Tree</h2>
      <div id="tree-list" class="tree-container"></div>

      <h2>Net Flow</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Resource</th>
            <th>Required</th>
            <th>Production</th>
            <th>Net</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="net-body"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
